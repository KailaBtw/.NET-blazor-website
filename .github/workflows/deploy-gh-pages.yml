# Deploy Blazor WebAssembly output to GitHub Pages.
# Works when this repo has a project that publishes static WASM output
# (either this project after converting to WASM, or a Client project).
# See docs/DEPLOY_ON_GH_PAGES.md.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish -c Release -o ./publish --no-restore
        # If you use a separate Client project for WASM, use:
        # run: dotnet publish Client/Client.csproj -c Release -o ./publish --no-restore

      - name: Ensure static output (WASM)
        run: |
          if [ ! -f ./publish/index.html ]; then
            echo "::error::No index.html in publish output. This workflow deploys Blazor WebAssembly. Convert the app to WASM or add a Client project. See docs/DEPLOY_ON_GH_PAGES.md"
            exit 1
          fi

      - name: Fix client-side routing (404 → index.html)
        run: cp ./publish/index.html ./publish/404.html 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
